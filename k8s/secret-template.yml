# This is a template for production secrets.
# Copy this file and fill in the values, then apply with:
#   kubectl apply -f k8s/secret-prod.yml
#
# DO NOT commit the actual secret file to version control!
# For production, use a secret management solution:
#   - HashiCorp Vault (via CSI driver or Vault agent injector)
#   - AWS Secrets Manager / Azure Key Vault (via Secrets Store CSI Driver)
#   - sealed-secrets or External Secrets Operator
---
apiVersion: v1
kind: Secret
metadata:
  name: talaria-db-secret
type: Opaque
stringData:
  # Replace with your actual SQL Server connection string
  connection-string: "Server=talaria-db;Database=Talaria;User=sa;Password=YourStrong!Passw0rd"
