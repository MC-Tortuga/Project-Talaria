name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run security audit
      run: |
        dotnet tool install --global dotnet-outdated-tool
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet outdated --include-transitive || true

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ControlPlane.Api
      uses: docker/build-push-action@v5
      with:
        context: ./src/ProjectTalaria.ControlPlane.Api
        push: false
        tags: talaria/controlplane:latest

    - name: Build DataPlane.Streamer
      uses: docker/build-push-action@v5
      with:
        context: ./src/ProjectTalaria.DataPlane.Streamer
        push: false
        tags: talaria/dataplane:latest