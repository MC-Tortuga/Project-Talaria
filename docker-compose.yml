# WARNING: This configuration is for LOCAL DEVELOPMENT ONLY.
# - Uses HTTP (TLS must be terminated at the ingress/load balancer in production)
# - Local file storage is used (not suitable for ephemeral containers in production)
# - Dev test token endpoint is enabled

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: talaria-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=talaria
      - MYSQL_USER=talaria
      - MYSQL_PASSWORD=talariapassword
    volumes:
      - talaria_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  controlplane:
    build:
      context: ./src
      dockerfile: ProjectTalaria.ControlPlane.Api/Dockerfile
    container_name: talaria-controlplane
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TalariaDb=Server=mysql;Port=3306;Database=talaria;User=talaria;Password=talariapassword;
      - Storage__UseLocal=true
      - Dev__EnableTestTokenEndpoint=true
      - Jwt__DevSecret=super-secret-key-for-interview-demo-32-bytes
      - Streamer__BaseUrl=http://localhost:5001
    volumes:
      - talaria_data:/app/data
    healthcheck:
      test: curl -sf http://localhost:5000/health/live || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy

  dataplane:
    build:
      context: ./src
      dockerfile: ProjectTalaria.DataPlane.Streamer/Dockerfile
    container_name: talaria-dataplane
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TalariaDb=Server=mysql;Port=3306;Database=talaria;User=talaria;Password=talariapassword;
      - Storage__UseLocal=true
      - Storage__LocalPath=/app/statements
    volumes:
      - talaria_data:/app/data
      - talaria_statements:/app/statements
    healthcheck:
      test: curl -sf http://localhost:5001/health/live || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - controlplane

volumes:
  talaria_data:
  talaria_statements:
  talaria_mysql_data:
